name: Pulumi Deploy

on:
  push:
    branches:
      - main

# Explicit permissions - principle of least privilege
permissions:
  contents: read
  id-token: write

jobs:
  update:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Pulumi Deploy
        uses: pulumi/actions@v6.6.1
        with:
          command: up
          stack-name: ${{ secrets.PULUMI_STACK_NAME }}
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Deployment complete
        run: |
          echo "✅ Deployment completed successfully"
          echo "Stack: ${{ secrets.PULUMI_STACK_NAME }}"
